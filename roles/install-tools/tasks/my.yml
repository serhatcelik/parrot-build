---
- name: Clone gist, clearpast
  git:
    repo: https://gist.github.com/026faf1f0d83fd63c2ef98405b29973e.git
    dest: /tmp/clearpast

- name: Copy clearpast to PATH
  copy:
    src: /tmp/clearpast/clearpast
    dest: "{{ ansible_env.HOME }}/.local/bin"
    mode: 0750

- name: Clone gist, cleanupgrade
  git:
    repo: https://gist.github.com/42fdfb14e0bf6eb06c2f64f75a25eba6.git
    dest: /tmp/cleanupgrade

- name: Copy cleanupgrade to PATH
  copy:
    src: /tmp/cleanupgrade/cleanupgrade
    dest: "{{ ansible_env.HOME }}/.local/bin"
    mode: 0750

- name: Clone gist, sysbackup
  git:
    repo: https://gist.github.com/96585cfb7459048e4f078793256f306d.git
    dest: /tmp/sysbackup

- name: Copy sysbackup to PATH
  copy:
    src: /tmp/sysbackup/sysbackup
    dest: "{{ ansible_env.HOME }}/.local/bin"
    mode: 0750
